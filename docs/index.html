<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>wind.lacroixdusud.club</title>

<!-- ================= ZOOM MOBILE ================= -->
<script>
function autoScale(){
    const baseWidth = 400; 
    const screenWidth = window.innerWidth;

    let scale = screenWidth / baseWidth;

    if(scale > 1) scale = 1;
    if(scale < 0.5) scale = 0.5;

    const wrapper = document.getElementById("wrapper");
    wrapper.style.transform = `scale(${scale})`;
    wrapper.style.transformOrigin = "top left";
    wrapper.style.width = baseWidth + "px";
}

window.addEventListener("load", autoScale);
window.addEventListener("resize", autoScale);
</script>

</head>

<body style="margin:0;">

<!-- WRAPPER GLOBAL -->
<div id="wrapper">

<div style="font-family: Arial, sans-serif; font-size:18px; text-align:left; margin:0px; color:black;"> 

<div style="font-size:14px; margin-bottom:10px;">
🕒 <span id="lastUpdate">--</span>
</div>

<!-- ================= COMPAS ================= -->
<div>
<div style="
position: relative; 
width:230px; height:230px; 
margin:5px 0; 
border:3px solid #333; 
border-radius:50%; 
background:#f9f9f9;
">

<div style="position:absolute; top:0; left:50%; transform:translateX(-50%); color:gray;">N</div>
<div style="position:absolute; bottom:0; left:50%; transform:translateX(-50%); color:gray;">S</div>
<div style="position:absolute; top:50%; left:0; color:gray;">W</div>
<div style="position:absolute; top:50%; right:0; color:gray;">E</div>

<div style="position:absolute; top:0; left:0;">
🌡️<span id="temperature">--</span>°C
</div>

<div style="position:absolute; top:0; right:0;">
💧<span id="humidity">--</span>%
</div>

<!-- FLECHE -->
<div id="flecheContainer"
style="position:absolute;top:50%;left:50%;width:95px;height:30px;transform-origin:center;">
<svg viewBox="0 0 95 30">

<polygon id="zoneRafale"
points="0,0 38,0 24,30 0,30"
fill="darkgray" stroke="black"/>

<polygon id="zoneVent"
points="38,0 82,0 95,15 82,30 24,30"
fill="gray" stroke="black"/>

<text x="56" y="26" text-anchor="middle" font-size="14">
<tspan id="textVent">--</tspan> km/h
</text>

<text x="16" y="16" text-anchor="middle" font-size="14">
<tspan id="textRafale">--</tspan>*
</text>

</svg>
</div>

</div>
</div>

<!-- ================= TIMELINE ================= -->
<div id="timeline-container">
<div id="timeline"></div>
</div>

</div>

<style>
#timeline-container{
width:250px;
background:#111;
overflow-x:auto;
margin-top:10px;
}

#timeline{
display:flex;
}

.col{
min-width:50px;
height:140px;
position:relative;
color:white;
}

.hour{
position:absolute;
top:0;
left:50%;
transform:translateX(-50%);
font-size:12px;
}

.band-wind{height:50%}
.band-temp{height:25%}
.band-hum{height:25%}
</style>

<script>

const channelID=3217135;
const apiKey="0NGJYHZW5BA8BCWD";

/* COLORS */
function windColor(v){
if(!v) return "#444";
if(v<10) return "#00aaff";
if(v<20) return "#00ff00";
if(v<30) return "#ffff00";
return "#ff0000";
}

/* LIVE */
async function updateVent(){
try{
const r=await fetch(`https://api.thingspeak.com/channels/${channelID}/fields/7/last.json?api_key=${apiKey}`);
const j=await r.json();

if(!j.field7) return;

const s=String(j.field7);
if(s.length<13) return;

const v=parseInt(s.slice(0,3))/10;
const g=parseInt(s.slice(3,5));
const dir=parseInt(s.slice(5,8));
const t=parseInt(s.slice(8,11))/2-25;
const h=parseInt(s.slice(11,13));

document.getElementById("textVent").textContent=v.toFixed(0);
document.getElementById("textRafale").textContent=g;

document.getElementById("temperature").textContent=t.toFixed(1);
document.getElementById("humidity").textContent=h;

document.getElementById("flecheContainer").style.transform=
`translate(-50%,-50%) rotate(${dir}deg)`;

document.getElementById("zoneVent").setAttribute("fill",windColor(v));
document.getElementById("zoneRafale").setAttribute("fill",windColor(g));

document.getElementById("lastUpdate").textContent=
new Date(j.created_at).toLocaleString("fr-FR");

}catch(e){}
}

/* TIMELINE SIMPLE */
async function loadTimeline(){
try{
const r=await fetch(`https://api.thingspeak.com/channels/${channelID}/feeds.json?results=40&api_key=${apiKey}`);
const d=await r.json();

const c=document.getElementById("timeline");
c.innerHTML="";

d.feeds.slice(-20).forEach(f=>{

if(!f.field7) return;

const s=String(f.field7);
if(s.length<13) return;

const v=parseInt(s.slice(0,3))/10;

const col=document.createElement("div");
col.className="col";

col.innerHTML=`
<div class="hour">${new Date(f.created_at).getHours()}h</div>
<div class="band-wind" style="background:${windColor(v)}"></div>
<div class="band-temp" style="background:orange"></div>
<div class="band-hum" style="background:cyan"></div>
`;

c.appendChild(col);
});

}catch(e){}
}

/* START */
updateVent();
setInterval(updateVent,15000);
loadTimeline();
setInterval(loadTimeline,60000);

</script>

</body>
</html>

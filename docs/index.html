<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wind.lacroixdusud.club</title>

<style>
body {
  margin: 0;
  overflow-x: hidden;
  font-family: Arial, sans-serif;
}

/* ===== MOBILE ===== */
@media (max-width: 600px) {

  /* cercle vent (TON BLOC EXACT via selector safe) */
  div[style*="border-radius:50%"] {
    width: 100vw !important;
    height: 100vw !important;
    margin: 0 auto !important;
  }

  /* timeline full width */
  #timeline-container {
    width: 100vw !important;
  }

  #timeline-wrapper {
    width: calc(100vw - 40px) !important;
  }

}
</style>

</head>

<body>

<div style="font-family: Arial, sans-serif; font-size:18px; text-align:left; margin:0px; color:black;"> 

<div style="font-size:14px; margin-bottom:10px;">
🕒 <span id="lastUpdate">--</span>
</div>

<!-- CERCLE -->
<div style="position: relative; 
  width:230px; height:230px; 
  margin:5px 0; 
  border:3px solid #333; 
  border-radius:50%; 
  background:#f9f9f9;
">

<!-- POINTS CARDINAUX -->
<div style="position:absolute; top:0px; left:50%; transform:translateX(-50%);">N</div>
<div style="position:absolute; bottom:0px; left:50%; transform:translateX(-50%);">S</div>
<div style="position:absolute; top:50%; right:2px;">E</div>
<div style="position:absolute; top:50%; left:2px;">W</div>

<!-- TEMP / HUM -->
<div style="position:absolute; top:0px; left:-2px;">
🌡️<span id="temperature">--</span>°C
</div>

<div style="position:absolute; top:0px; right:0px;">
💧<span id="humidity">--</span>%
</div>

<!-- VENT (inchangé) -->
<div id="flecheContainer"></div>

</div>

<!-- TIMELINE -->
<div id="timeline-container">
  <div id="timeline-wrapper">
    <div id="timeline"></div>
  </div>
</div>

</div>

<script>
const channelID = 3217135;
const readAPIKey = "0NGJYHZW5BA8BCWD";

async function updateVent(){
  try{
    const r = await fetch(`https://api.thingspeak.com/channels/${channelID}/fields/7/last.json?api_key=${readAPIKey}`);
    const j = await r.json();

    const str = j.field7?.toString();
    if(!str) return;

    const v = parseInt(str.slice(0,3),10)/10;
    const rfl = parseInt(str.slice(3,5),10);

    document.getElementById("temperature").textContent = (parseInt(str.slice(8,11),10)/2-25).toFixed(1);
    document.getElementById("humidity").textContent = parseInt(str.slice(11,13),10);

  } catch(e){}
}

updateVent();
setInterval(updateVent,15000);
</script>

</body>
</html>

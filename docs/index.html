<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>wind.lacroixdusud.club</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:Arial, sans-serif;
}

#app {
  padding:8px;
  max-width:100vw;
  box-sizing:border-box;
}

/* cercle responsive */
.weather-circle {
  width:clamp(180px, 65vw, 230px);
  height:clamp(180px, 65vw, 230px);
  border:3px solid #333;
  border-radius:50%;
  background:#f9f9f9;
  position:relative;
  margin-top:5px;
}

/* timeline */
#timeline-container {
  display:flex;
  width:100%;
  max-width:420px;
  background:#111;
  margin-top:5px;
}

#units-column {
  width:40px;
  background:black;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
}

#timeline {
  display:flex;
  overflow-x:auto;
}

.col {
  min-width:50px;
  height:140px;
  position:relative;
}

.band-wind {height:50%;}
.band-temp {height:25%;}
.band-hum {height:25%;}

.content {
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:space-evenly;
  font-size:12px;
}
</style>
</head>

<body>

<div id="app">

🕒 <span id="lastUpdate">--</span>

<div class="weather-circle">

<div style="position:absolute;top:0;left:50%;transform:translateX(-50%)">N</div>
<div style="position:absolute;bottom:0;left:50%;transform:translateX(-50%)">S</div>
<div style="position:absolute;top:50%;right:0;transform:translateY(-50%)">E</div>
<div style="position:absolute;top:50%;left:0;transform:translateY(-50%)">W</div>

🌡️<span id="temperature">--</span>°C  
💧<span id="humidity">--</span>%

<!-- flèche -->
<div id="arrow" style="
position:absolute;
top:50%;
left:50%;
width:100px;
height:30px;
transform-origin:center;
">

<svg viewBox="0 0 100 30">
<polygon points="0,15 80,0 80,30" fill="gray"/>
</svg>

</div>

</div>

<!-- timeline -->
<div id="timeline-container">
<div id="timeline"></div>
</div>

</div>

<script>
const channelID = 3217135;
const readAPIKey = "0NGJYHZW5BA8BCWD";

async function updateVent(){
  const r = await fetch(`https://api.thingspeak.com/channels/${channelID}/fields/7/last.json?api_key=${readAPIKey}`);
  const j = await r.json();

  if(!j.field7) return;

  const s = j.field7.toString();

  const vent = parseInt(s.slice(0,3))/10;
  const dir = parseInt(s.slice(5,8));
  const temp = parseInt(s.slice(8,11))/2-25;
  const hum = parseInt(s.slice(11,13));

  document.getElementById("temperature").textContent=temp.toFixed(1);
  document.getElementById("humidity").textContent=hum;

  document.getElementById("arrow").style.transform =
    `translate(-50%,-50%) rotate(${dir}deg)`;

  document.getElementById("lastUpdate").textContent =
    new Date(j.created_at).toLocaleString();
}

async function loadTimeline(){
  const r = await fetch(`https://api.thingspeak.com/channels/${channelID}/feeds.json?results=50&api_key=${readAPIKey}`);
  const data = await r.json();

  const timeline = document.getElementById("timeline");
  timeline.innerHTML="";

  data.feeds.forEach(f=>{
    if(!f.field7) return;

    const s=f.field7.toString();
    const vent=parseInt(s.slice(0,3))/10;
    const temp=parseInt(s.slice(8,11))/2-25;
    const hum=parseInt(s.slice(11,13));

    const col=document.createElement("div");
    col.className="col";

    const wind=document.createElement("div");
    wind.className="band-wind";
    wind.style.background="blue";

    const t=document.createElement("div");
    t.className="band-temp";
    t.style.background="orange";

    const h=document.createElement("div");
    h.className="band-hum";
    h.style.background="cyan";

    const c=document.createElement("div");
    c.className="content";
    c.innerHTML=`
      <div>${Math.round(vent)}</div>
      <div>${Math.round(temp)}</div>
      <div>${Math.round(hum)}</div>
    `;

    col.appendChild(wind);
    col.appendChild(t);
    col.appendChild(h);
    col.appendChild(c);

    timeline.appendChild(col);
  });
}

updateVent();
setInterval(updateVent,15000);

loadTimeline();
setInterval(loadTimeline,60000);
</script>

</body>
</html>

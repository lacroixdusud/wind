<script>
const channelID = 3217135;
const readAPIKey = "0NGJYHZW5BA8BCWD";

/* === FONCTIONS UTILES === */

function avgDirection(arr){
    if(!arr || arr.length === 0) return 0;
    let sumSin=0, sumCos=0, count=0;
    arr.forEach(d=>{
        if(typeof d !== "number" || isNaN(d)) return;
        const rad=d*Math.PI/180;
        sumSin+=Math.sin(rad);
        sumCos+=Math.cos(rad);
        count++;
    });
    if(count===0) return 0;
    let deg=Math.atan2(sumSin/count,sumCos/count)*180/Math.PI;
    return (deg+360)%360;
}

function windColor(v){
    if(v===null||isNaN(v)) return "#ccc";
    //const stops=[{v:0,c:[53,77,255]},{v:10,c:[0,200,0]},{v:20,c:[255,255,0]},{v:40,c:[255,140,0]},{v:50,c:[255,0,0]},{v:60,c:[150,0,255]}]; // palette 2 
    const stops=[{v:0,c:[0,0,255]},{v:7,c:[0,150,255]},{v:10,c:[0,200,0]},{v:20,c:[255,255,0]},{v:40,c:[255,140,0]},{v:50,c:[255,0,0]},{v:60,c:[150,0,255]}]; // palette 1 
   
    for(let i=0;i<stops.length-1;i++){
        if(v<=stops[i+1].v){
            let t=(v-stops[i].v)/(stops[i+1].v-stops[i].v);
            let c1=stops[i].c,c2=stops[i+1].c;
            return `rgb(${Math.round(c1[0]+(c2[0]-c1[0])*t)},${Math.round(c1[1]+(c2[1]-c1[1])*t)},${Math.round(c1[2]+(c2[2]-c1[2])*t)})`;
        }
    }
    return "rgb(150,0,255)";
}

function getTextColor(rgb){
    const values = rgb.match(/\d+/g).map(Number);
    const brightness = (values[0]*299 + values[1]*587 + values[2]*114) / 1000;
    return brightness > 80 ? "black" : "white";
}


function tempColor(t){ /* identique code 2 */ 
    if(t===null||isNaN(t)) return "#ccc";
    const stops=[{v:-15,c:[0,255,255]},{v:-5,c:[100,180,255]},{v:5,c:[255,255,255]},{v:15,c:[255,255,150]},{v:25,c:[255,165,0]},{v:35,c:[255,0,0]},{v:45,c:[220,0,0]}];
    for(let i=0;i<stops.length-1;i++){
        if(t<=stops[i+1].v){
            let r=(t-stops[i].v)/(stops[i+1].v-stops[i].v);
            let c1=stops[i].c,c2=stops[i+1].c;
            return `rgb(${Math.round(c1[0]+(c2[0]-c1[0])*r)},${Math.round(c1[1]+(c2[1]-c1[1])*r)},${Math.round(c1[2]+(c2[2]-c1[2])*r)})`;
        }
    }
    return "rgb(220,0,0)";
}
function humColor(h){ /* identique code 2 */
    if(h===null||isNaN(h)) return "#ccc";
    const stops=[{v:0,c:[209,198,173]},{v:30,c:[209,198,173]},{v:40,c:[169,142,99]},{v:70,c:[0,255,255]},{v:85,c:[4,155,235]},{v:100,c:[38,171,238]}];
    for(let i=0;i<stops.length-1;i++){
        if(h<=stops[i+1].v){
            let t=(h-stops[i].v)/(stops[i+1].v-stops[i].v);
            let c1=stops[i].c,c2=stops[i+1].c;
            return `rgb(${Math.round(c1[0]+(c2[0]-c1[0])*t)},${Math.round(c1[1]+(c2[1]-c1[1])*t)},${Math.round(c1[2]+(c2[2]-c1[2])*t)})`;
        }
    }
    return "rgb(0,0,100)";
}

/* === UPDATE FLECHE ET INFOS EN TEMPS REEL === */
async function updateVent(){
    try{
        // Vent
		const respData = await fetch(`https://api.thingspeak.com/channels/${channelID}/fields/7/last.json?api_key=${readAPIKey}`);
		const jsonData = await respData.json();
		const createdAt = jsonData.created_at;
		const nbData = jsonData.field7;
		const strData = nbData?.toString();
		
		const flecheW=document.getElementById("flecheContainer");
		const flecheE=document.getElementById("flecheContainerE");
		
		const zoneVent = document.getElementById("zoneVent");
		const zoneRafale = document.getElementById("zoneRafale");
		const zoneVentE = document.getElementById("zoneVentE");
		const zoneRafaleE = document.getElementById("zoneRafaleE");
		
		const flecheSeuilNW = document.getElementById("runwayArrowNW");
		const flecheSeuilSE = document.getElementById("runwayArrowSE");
	
	// heure
	if (createdAt) {
    		const date = new Date(createdAt);

    		const options = {
        	day: '2-digit',
        	month: '2-digit',
        	year: 'numeric',
        	hour: '2-digit',
        	minute: '2-digit'
    		};

    	const formatted = date.toLocaleString('fr-FR', options);

    	document.getElementById("lastUpdate").textContent = formatted;
	}
	
	// Affichage noData
        if(strData && strData!="NULL")
	{
            const vitesse=parseInt(strData.slice(0,3),10)/10;
            const rafale=parseInt(strData.slice(3,5),10);
            const direction=parseInt(strData.slice(5,8),10);
	
	// Mettre à jour les valeurs dans la fleche SVG
	    if(vitesse<10)
		{
		document.getElementById("textVent").textContent=vitesse.toFixed(1);
		document.getElementById("textVentE").textContent=vitesse.toFixed(1);
		}
	    else 	
		{
		document.getElementById("textVent").textContent=vitesse.toFixed(0);
		document.getElementById("textVentE").textContent=vitesse.toFixed(0);
		}
	    
	    document.getElementById("textRafale").textContent=rafale.toFixed(0);
	    document.getElementById("textRafaleE").textContent=rafale.toFixed(0);

            
	 // Mettre à jour les couleurs du SVG
        zoneVent.setAttribute("fill", windColor(vitesse));
        zoneRafale.setAttribute("fill", windColor(rafale));
	    zoneVentE.setAttribute("fill", windColor(vitesse));
        zoneRafaleE.setAttribute("fill", windColor(rafale));

         // Mettre à jour les couleurs des textes de la fleche de vent
	    document.getElementById("textVent").setAttribute("fill", getTextColor(windColor(vitesse))); 
	    document.getElementById("kmhW").setAttribute("fill", getTextColor(windColor(vitesse)));
	    document.getElementById("textRafale").setAttribute("fill", getTextColor(windColor(rafale)));
	    document.getElementById("starW").setAttribute("fill", getTextColor(windColor(rafale)));

	    document.getElementById("textVentE").setAttribute("fill", getTextColor(windColor(vitesse))); 
	    document.getElementById("kmhE").setAttribute("fill", getTextColor(windColor(vitesse)));
	    document.getElementById("textRafaleE").setAttribute("fill", getTextColor(windColor(rafale)));
	    document.getElementById("starE").setAttribute("fill", getTextColor(windColor(rafale)));

	// affiche l'une au l'autre des fleches
	if ( direction > 180 ) {
		flecheW.setAttribute("display","inline");
		flecheW.setAttribute("transform", `translate(352 400) rotate(${direction+90})`);
		flecheE.setAttribute("display","none");
			}
	else  {
		flecheE.setAttribute("display","inline");
		flecheE.setAttribute("transform", `translate(448 400) rotate(${direction-90})`);
		flecheW.setAttribute("display","none");
		}
	// affiche l'une au l'autre des fleches de sens de piste 
	if ( direction > 47 + 2 && direction < 227-2 ) {
		flecheSeuilNW.setAttribute("display","none");
		flecheSeuilSE.setAttribute("display","inline");
		}
	else if (direction > 227 + 2 ) { 
		flecheSeuilSE.setAttribute("display","none");
		flecheSeuilNW.setAttribute("display","inline");

		}
	else if (direction < 47 - 2) { 
		flecheSeuilSE.setAttribute("display","none");
		flecheSeuilNW.setAttribute("display","inline");
		}
	else  { 
		flecheSeuilSE.setAttribute("display","none");
		flecheSeuilNW.setAttribute("display","inline");
		}

        } else 
		{
        flecheW.style.setAttribute("display","none");
		flecheE.style.setAttribute("display","none");
        document.getElementById("temperature").textContent="--";
        document.getElementById("humidity").textContent="--";
        }

        // Température
        document.getElementById("temperature").textContent=(parseInt(strData.slice(8,11),10)/2-25).toFixed(1);

        // Humidité
        document.getElementById("humidity").textContent=parseInt(strData.slice(11,13),10).toFixed(0);

    } catch(e){
        console.warn("Données non disponibles :", e);
    }
}

/* === TIMELINE === */
async function loadTimeline(){
    try{
        const resp = await fetch(`https://api.thingspeak.com/channels/${channelID}/feeds.json?results=200&api_key=${readAPIKey}`);
        const data = await resp.json();

        const now = new Date();
        const last24h = new Date(now - 24*60*60*1000);

        const feeds = data.feeds
            .map(f=>({time:new Date(f.created_at), field7:f.field7}))
            .filter(f=>f.time>=last24h)
            .sort((a,b)=>a.time-b.time);

        const hourlyMap={};

        feeds.forEach(feed=>{
            if(!feed.field7) return;
            const str = feed.field7.toString();
            const vent=parseInt(str.slice(0,3))/10;
	    const dir=parseInt(str.slice(5,8));
            const temp=parseInt(str.slice(8,11))/2-25;
            const hum=parseInt(str.slice(11,13));

            const d=feed.time;
            const key=d.getFullYear()+"-"+d.getMonth()+"-"+d.getDate()+"-"+d.getHours();

            if(!hourlyMap[key]) hourlyMap[key]={time:d, vent:[], dir:[], temp:[], hum:[] };

            hourlyMap[key].vent.push(vent);
            hourlyMap[key].dir.push(dir);
	    hourlyMap[key].temp.push(temp); 
            hourlyMap[key].hum.push(hum); 
        });

        const hourlyData=Object.values(hourlyMap).map(h=>{
            const hourStart=new Date(h.time);
            hourStart.setMinutes(0,0,0);
            const hourEnd=new Date(hourStart);
            hourEnd.setHours(hourEnd.getHours()+1);

            return {
                time:h.time,
                vent:h.vent.length>0?h.vent.reduce((a,b)=>a+b,0)/h.vent.length:null,
                dir:avgDirection(h.dir),
                temp:h.temp.length>0?h.temp.reduce((a,b)=>a+b,0)/h.temp.length:null,
                hum:h.hum.length>0?h.hum.reduce((a,b)=>a+b,0)/h.hum.length:null
            };
        }).sort((a,b)=>a.time-b.time);

        const container=document.getElementById("timeline");
        container.innerHTML="";

        hourlyData.forEach(d=>{
            const col=document.createElement("div");
            col.className="col";

            const bandWind=document.createElement("div");
            bandWind.className="band-wind";
            bandWind.style.backgroundColor=windColor(d.vent);

            const bandTemp=document.createElement("div");
            bandTemp.className="band-temp";
            bandTemp.style.backgroundColor=tempColor(d.temp);

            const bandHum=document.createElement("div");
            bandHum.className="band-hum";
            bandHum.style.backgroundColor=humColor(d.hum);

            col.appendChild(bandWind);
            col.appendChild(bandTemp);
            col.appendChild(bandHum);

            const rotation=(typeof d.dir==="number"&&!isNaN(d.dir))?d.dir+90:0;
            const hourLabel=d.time.getHours()+"h";

            const content=document.createElement("div");
            content.className="content";
            content.innerHTML=`
                <div class="hour">${hourLabel}</div>
                <div>${d.vent!==null?Math.round(d.vent):"--"}</div>
                <div>${d.vent!==null?Math.round(d.vent):"--"}</div>
                <div style="transform:rotate(${rotation}deg); font-size:20px;">➤</div>
                <div>${d.temp!==null?Math.round(d.temp):"--"}</div>
                <div>${d.hum!==null?Math.round(d.hum):"--"}</div>
            `;
            col.appendChild(content);
            container.appendChild(col);
        });

        setTimeout(()=>{container.scrollLeft=container.scrollWidth;},0);

    } catch(e){
        console.warn("Erreur chargement :",e);
    }
}
	
// Lancement
updateVent();
setInterval(updateVent,15000);
loadTimeline();
setInterval(loadTimeline,60000);
</script>

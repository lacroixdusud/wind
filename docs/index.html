<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>wind.lacroixdusud.club</title>

<!-- ✅ IMPORTANT : viewport pour mobile -->
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
/* ✅ Zoom global propre sans flou */
body {
  zoom: 1.2; /* ajuste ici (1 = normal, 1.3 = plus gros) */
  margin: 0;
  font-family: Arial, sans-serif;
}

/* fallback Firefox */
@supports not (zoom: 1) {
  body {
    transform: scale(1.2);
    transform-origin: top left;
    width: calc(100% / 1.2);
  }
}
</style>

</head>

<body>

<div style="font-size:14px; margin-bottom:10px;">
🕒 <span id="lastUpdate">--</span>
</div>

<!-- === CERCLE === -->
<div style="
position: relative; 
width:230px; height:230px; 
margin:5px; 
border:3px solid #333; 
border-radius:50%; 
background:#f9f9f9;
">

<div style="position:absolute; top:0; left:50%; transform:translateX(-50%);">N</div>
<div style="position:absolute; bottom:0; left:50%; transform:translateX(-50%);">S</div>
<div style="position:absolute; top:50%; right:2px; transform:translateY(-50%);">E</div>
<div style="position:absolute; top:50%; left:2px; transform:translateY(-50%);">W</div>

<div style="position:absolute; top:0; left:0;">
🌡️<span id="temperature">--</span>°C
</div>

<div style="position:absolute; top:0; right:0;">
💧<span id="humidity">--</span>%
</div>

</div>

<!-- === TIMELINE === -->
<div id="timeline" style="display:flex; overflow-x:auto; width:100%; background:#111; color:white; margin-top:10px;"></div>

<script>

const channelID = 3217135;
const readAPIKey = "0NGJYHZW5BA8BCWD";

/* === UPDATE DATA === */
async function updateVent(){
    try{
        const r = await fetch(`https://api.thingspeak.com/channels/${channelID}/fields/7/last.json?api_key=${readAPIKey}`);
        const d = await r.json();

        if(!d.field7) return;

        const str = d.field7.toString();

        document.getElementById("temperature").textContent =
            (parseInt(str.slice(8,11))/2-25).toFixed(1);

        document.getElementById("humidity").textContent =
            parseInt(str.slice(11,13));

        document.getElementById("lastUpdate").textContent =
            new Date(d.created_at).toLocaleString();

    } catch(e){
        console.log(e);
    }
}

/* === TIMELINE SIMPLE === */
async function loadTimeline(){
    try{
        const r = await fetch(`https://api.thingspeak.com/channels/${channelID}/feeds.json?results=20&api_key=${readAPIKey}`);
        const data = await r.json();

        const tl = document.getElementById("timeline");
        tl.innerHTML = "";

        data.feeds.forEach(f=>{
            if(!f.field7) return;

            const str = f.field7.toString();
            const vent = parseInt(str.slice(0,3))/10;

            const col = document.createElement("div");
            col.style.minWidth = "50px";
            col.style.padding = "5px";
            col.style.textAlign = "center";
            col.innerHTML = `
                <div>${new Date(f.created_at).getHours()}h</div>
                <div>${vent}</div>
            `;

            tl.appendChild(col);
        });

    } catch(e){
        console.log(e);
    }
}

/* RUN */
updateVent();
setInterval(updateVent,15000);

loadTimeline();
setInterval(loadTimeline,60000);

</script>

</body>
</html>

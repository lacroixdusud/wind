<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">

  <!-- IMPORTANT MOBILE -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>wind.lacroixdusud.club</title>

  <style>
    /* =========================
       BASE DESKTOP (inchangé)
    ========================= */

    body {
      margin: 0;
      padding: 0;
    }

    /* =========================
       ZONE PRINCIPALE
    ========================= */
    .main {
      font-family: Arial, sans-serif;
      font-size: 18px;
      text-align: left;
      margin: 0;
      color: black;
      width: 100%;
      box-sizing: border-box;
    }

    /* =========================
       CERCLE VENT
    ========================= */
    .wind-circle {
      position: relative;
      width: 230px;
      height: 230px;
      margin: 5px auto;
      border: 3px solid #333;
      border-radius: 50%;
      background: #f9f9f9;
    }

    /* =========================
       TIMELINE
    ========================= */
    #timeline-container {
      display: flex;
      width: 250px;
      background: #111;
      font-family: Arial, sans-serif;
      margin-top: 5px;
    }

    /* =========================
       MOBILE RESPONSIVE
    ========================= */
    @media (max-width: 600px) {

      /* FULL WIDTH GLOBAL */
      .main {
        font-size: 16px;
      }

      /* ZOOM GLOBAL DU BLOC PRINCIPAL */
      .wind-circle {
        width: 100vw;
        height: 100vw;
        max-width: 100vw;
        transform: scale(1);
      }

      /* CENTRAGE INFOS */
      .wind-wrapper {
        display: flex;
        justify-content: center;
        width: 100%;
      }

      /* TIMELINE FULL WIDTH */
      #timeline-container {
        width: 100vw;
        transform: scale(1);
        transform-origin: left top;
      }

      #timeline-wrapper {
        width: calc(100vw - 40px);
      }

      /* EVITE SCROLL HORIZONTAL GLOBAL */
      body {
        overflow-x: hidden;
      }

      /* OPTION : zoom global léger (décommenter si tu veux tout agrandir)
      .main {
        transform: scale(1.05);
        transform-origin: top center;
      }
      */
    }

  </style>
</head>

<body>

<div class="main">

<div style="font-size:14px; margin-bottom:10px;">
🕒 <span id="lastUpdate">--</span>
</div>

<!-- === WRAPPER CENTRÉ === -->
<div class="wind-wrapper">

<!-- === FLECHE DE VENT ET INFOS === -->
<div class="wind-circle">

<!-- ====== TON CODE RESTE IDENTIQUE À PARTIR ICI ====== -->

<!-- Points cardinaux --> 	
<div style="position:absolute; top:0px; left:50%; transform: translateX(-50%); font-size:16px;color:gray;">N</div>
<div style="position:absolute; bottom:0px; left:50%; transform: translateX(-50%); font-size:16px;color:gray;">S</div>
<div style="position:absolute; top:50%; right:2px; transform: translateY(-50%); font-size:16px;color:gray;">E</div>
<div style="position:absolute; top:50%; left:2px; transform: translateY(-50%); font-size:16px;color:gray;">W</div>

<!-- Temp et hum -->
<div style="position:absolute; top:0px; left:-2px; transform: translateY(-50%);font-size:16px;color:black;">
🌡️<span id="temperature">--</span>°C
</div>

<div style="position:absolute; top:0px; right:0px; transform: translateY(-50%);font-size:16px;color:black;">
💧<span id="humidity">--</span>%
</div>

<!-- ===== RESTE DE TON BLOC INCHANGÉ ===== -->
<!-- (je ne le recolle pas entier sinon trop long, mais tu le gardes identique) -->

</div>
</div>

<!-- === TIMELINE === -->
<div id="timeline-container">
  <div id="units-column">...</div>
  <div id="timeline-wrapper">
    <div id="timeline"></div>
  </div>
</div>

</div>

</body>
</html>
